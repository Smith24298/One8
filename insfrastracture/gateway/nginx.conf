events {
    # Handles worker processes and TCP connections.
}

http {

    # Docker resolves service names using its internal DNS.
    # Upstream is a named group of backend servers.
    # Routes use these aliases instead of concrete servers.

    upstream auth {
        server auth-service:5001;
    }

    upstream product {
        server product-service:5002;
    }

    upstream order {
        server order-service:5003;
    }

    server {

        listen 80;

        location /api/auth/ {
            proxy_pass http://auth;
        }

        location /api/product/ {
            proxy_pass http://product;
        }

        location /api/order/ {
            proxy_pass http://order;
        }
    }
}